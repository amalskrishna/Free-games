<!DOCTYPE html>
<html>
<head>
    <title>Game Giveaway Test</title>
    <link rel="stylesheet" href="games.css">
</head>
<body>

    <button onclick="loadData()">Load Giveaway</button>

    <div id="games"></div>

    <script>
        function getDaysLeft(dstring){
            const enddate = new Date(dstring);
            const today = new Date();
            const diff =  enddate - today;
            return Math.ceil(diff / (1000 * 60 * 60 * 24));
        }
        async function loadData() {

            const response = await fetch(
                "https://www.gamerpower.com/api/giveaways"
            );

            const data = await response.json();

            const filter = data.filter(game => {
                const plat=game.platforms.toLowerCase();
                const stepic = plat.includes("steam") || plat.includes("epic");
                const isgame = game.type.toLowerCase() === "game";
                return stepic && isgame;
            });
            console.log(filter.length);

            filter.sort((a,b) => {
                return new Date(a.end_date) - new Date(b.end_date);
            });

            const container = document.getElementById("games");

            for (let i = 0; i < filter.length; i++) {

                const gam = filter[i];
                const daysleft = getDaysLeft(gam.end_date)
                console.log(gam.title, daysleft); 
                container.innerHTML += `
                    <div class="card">
                        <img src=${gam.image}>
                        <h2>${gam.title}</h2>
                        <p>Normal Price : ${gam.worth}</p>
                        <p><strong>Platform : </strong>${gam.platforms}</p>
                        <p><strong>End date : </strong>${gam.end_date}</p>
                        <p>${daysleft} days left</p>
                        <a href=${gam.open_giveaway_url} target="_blank">Click to page</a>
                    </div>
                `;
            }
        }
    </script>

</body>
</html>
